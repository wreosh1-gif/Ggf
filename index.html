<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيك داون - TikDown | تحميل فيديوهات تيك توك</title>
    <style>
        :root {
            --bg: #0f172a; /* كحلي غامق هادئ */
            --card: #1e293b;
            --accent: #38bdf8; /* أزرق سماوي مريح */
            --text: #f1f5f9;
            --secondary-text: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 50px 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* تنسيق اسم الموقع كبديل للوجو */
        .brand-name {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: var(--secondary-text); font-size: 1rem; line-height: 1.5; }

        input {
            width: 100%;
            padding: 16px;
            margin: 25px 0;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            text-align: center;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .action-btn {
            background: var(--accent);
            color: #0f172a;
            padding: 16px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: #7dd3fc;
        }

        #ad-placeholder {
            margin: 30px 0;
            padding: 20px;
            border: 1px dashed rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.02);
        }

        #timer-box { display: none; margin-top: 20px; }
        #count { color: #fbbf24; font-size: 1.8rem; font-weight: bold; }
        
        #download-link {
            display: none;
            background: #22c55e; /* لون أخضر للنجاح */
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- تم استبدال الصورة بنص أنيق -->
        <div class="brand-name">TikDown</div>
        <h1>تيك داون</h1>
        <p>حمّل فيديوهاتك المفضلة بدون علامة مائية وبأعلى جودة ممكنة.</p>
        
        <input type="text" id="videoUrl" placeholder="الصق رابط الفيديو هنا...">
        
        <button class="action-btn" id="start-btn" onclick="processVideo()">تجهيز رابط التحميل</button>

        <!-- مساحة إعلان Adsterra -->
        <div id="ad-placeholder">
            <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 10px;">إعلان ممول</p>
            <!-- ضع كود إعلانك من Adsterra هنا -->
            <div id="ad-content" style="min-height: 100px;">
                <p style="color: #475569; font-size: 0.85rem;">[ سيظهر الإعلان هنا ]</p>
            </div>
        </div>

        <div id="timer-box">
            <p>انتظر ثواني لتجهيز الفيديو... <br><span id="count">30</span> ثانية</p>
        </div>

        <a href="#" id="download-link" target="_blank" class="action-btn">تحميل الفيديو الآن ✅</a>
    </div>

    <script>
        function processVideo() {
            let inputUrl = document.getElementById('videoUrl').value;
            
            if(!inputUrl.includes('tiktok.com')) {
                alert("يرجى إدخال رابط تيك توك صحيح");
                return;
            }

            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('timer-box').style.display = 'block';

            let timeLeft = 30;
            const timerDisplay = document.getElementById('count');
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    document.getElementById('timer-box').style.display = 'none';
                    
                    // توجيه ذكي للتحميل
                    let finalDownloadUrl = "https://snaptik.app/abc?url=" + encodeURIComponent(inputUrl);
                    const dlBtn = document.getElementById('download-link');
                    dlBtn.style.display = 'block';
                    dlBtn.href = finalDownloadUrl;
                }
            }, 1000);
        }
    </script>

</body>
</html>
